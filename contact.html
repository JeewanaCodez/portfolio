<section class="page contact-page">

        <h1 class="section-title">
            Contact Me
        </h1>

        <form class="contact-form"
      action="https://formsubmit.co/jeewanakaushalya8@gmail.com"
      method="POST"
      data-aos="fade-up">

    <input type="text"
           name="name"
           placeholder="Your Name"
           required>

    <input type="email"
           name="email"
           placeholder="Your Email"
           required>

    <textarea name="message"
              rows="6"
              placeholder="Your Message"
              required></textarea>

    <!-- DISABLE CAPTCHA -->

    <input type="hidden"
           name="_captcha"
           value="false">

    <!-- SUCCESS PAGE -->

    <input type="hidden"
           name="_next"
           value="https://JeewanaCodez.github.io/portfolio/contact.html">

    <button type="submit"
            class="btn">

        Send Message

    </button>
